name: CLI — Build & Release

on:
  push:
    branches: [main]
    paths:
      - 'client-cli/**'
      - 'server-cli/**'
      - '.github/workflows/cli.yml'
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'client-cli/**'
      - 'server-cli/**'
      - '.github/workflows/cli.yml'

jobs:
  build-client:
    name: Build workar (client CLI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client-cli
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client-cli/package-lock.json

      - run: npm ci
      - run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: workar-dist
          path: client-cli/dist/
          if-no-files-found: error

  build-server:
    name: Build workar-server (server CLI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server-cli
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server-cli/package-lock.json

      - run: npm ci
      - run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: workar-server-dist
          path: server-cli/dist/
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-client, build-server]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download client dist
        uses: actions/download-artifact@v4
        with:
          name: workar-dist
          path: release/workar/dist

      - name: Download server dist
        uses: actions/download-artifact@v4
        with:
          name: workar-server-dist
          path: release/workar-server/dist

      - name: Copy runtime files
        run: |
          cp client-cli/package.json release/workar/
          cp server-cli/package.json release/workar-server/
          cp server-cli/work-defs.json release/workar-server/

      - name: Package archives
        run: |
          cd release
          zip -r ../workar-${{ github.ref_name }}.zip workar/
          zip -r ../workar-server-${{ github.ref_name }}.zip workar-server/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            workar-${{ github.ref_name }}.zip
            workar-server-${{ github.ref_name }}.zip
          generate_release_notes: true

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [build-client, build-server]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      id-token: write   # required for npm Trusted Publishers (OIDC)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Download client dist
        uses: actions/download-artifact@v4
        with:
          name: workar-dist
          path: client-cli/dist

      - name: Download server dist
        uses: actions/download-artifact@v4
        with:
          name: workar-server-dist
          path: server-cli/dist

      - name: Version workar with build number
        working-directory: client-cli
        run: |
          BASE=$(node -p "const v=require('./package.json').version.split('.'); v[0]+'.'+v[1]")
          npm version "${BASE}.${{ github.run_number }}" --no-git-tag-version

      - name: Version workar-server with build number
        working-directory: server-cli
        run: |
          BASE=$(node -p "const v=require('./package.json').version.split('.'); v[0]+'.'+v[1]")
          npm version "${BASE}.${{ github.run_number }}" --no-git-tag-version

      - name: Publish workar (Trusted Publisher / provenance)
        run: npm publish --provenance --access public
        working-directory: client-cli

      - name: Publish workar-server
        run: npm publish --provenance --access public
        working-directory: server-cli
